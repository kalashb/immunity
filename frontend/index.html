<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Have Immunity</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="name-bar">
      <label for="name-input">Your name (optional)</label>
      <input type="text" id="name-input" placeholder="Name" maxlength="80" autocomplete="name" />
    </div>
    <header class="status-bar">
      <div class="counter" data-key="patience">
        <span class="label">Patience</span>
        <span class="value" id="val-patience">—</span>
      </div>
      <div class="counter" data-key="irritation">
        <span class="label">Irritation</span>
        <span class="value" id="val-irritation">—</span>
      </div>
      <div class="counter" data-key="disappointment">
        <span class="label">Disappointment</span>
        <span class="value" id="val-disappointment">—</span>
      </div>
      <div class="counter" data-key="administrative_load">
        <span class="label">Mental load</span>
        <span class="value" id="val-administrative_load">—</span>
      </div>
    </header>

    <main class="eyes-section">
      <div id="eyes-container" class="eyes-container state-neutral">
        <div class="eyes">
          <div class="eye">
            <div class="eye-ball">
              <div class="eye-sclera"></div>
              <div class="pupil"></div>
            </div>
            <div class="eye-lid eye-lid-top"></div>
          </div>
          <div class="eye">
            <div class="eye-ball">
              <div class="eye-sclera"></div>
              <div class="pupil"></div>
            </div>
            <div class="eye-lid eye-lid-top"></div>
          </div>
        </div>
      </div>
      <div id="blacklist-overlay" class="blacklist-overlay hidden">
        <span>ACCESS DENIED</span>
        <span class="sub">CITIZEN FLAGGED</span>
        <div class="blacklist-actions">
          <button type="button" id="reset-btn">Reset for next user</button>
          <button type="button" id="clear-logs-btn">Clear logs</button>
        </div>
      </div>
    </main>

    <section class="input-section">
      <div id="processing" class="processing hidden">
        <span id="processing-text">Reviewing...</span>
      </div>
      <div id="response" class="response hidden">
        <div id="response-reaction" class="response-reaction"></div>
        <div id="response-answer" class="response-answer hidden"></div>
      </div>
      <div class="input-row">
        <input
          type="text"
          id="input"
          placeholder="Enter inquiry..."
          maxlength="500"
          autocomplete="off"
        />
        <button type="button" id="submit">Submit</button>
        <button type="button" id="connect-arduino" title="Connect Arduino buzzer">&#x1F50C;</button>
      </div>
      <div id="event-log" class="event-log"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
